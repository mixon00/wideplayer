<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WidePlayer for X</title>
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <p class="eyebrow">WidePlayer for X</p>
        <h1>Quick Settings</h1>
        <p class="description">Choose whether videos expand automatically and set the target width.</p>
      </header>

      <section class="setting-card">
        <label class="toggle-row" for="auto-enable">
          <div>
            <span class="setting-label">Auto enable</span>
            <p class="setting-hint">Enable automatic behavior when a supported video appears in the feed.</p>
          </div>
          <input id="auto-enable" type="checkbox" />
        </label>
      </section>

      <section class="setting-card">
        <div class="range-header">
          <div>
            <span class="setting-label">Width</span>
            <p class="setting-hint">Controls the target width relative to the tweet.</p>
          </div>
          <output id="width-output" for="width-range width-input">135%</output>
        </div>
        <input id="width-range" type="range" min="110" max="180" step="1" value="135" />
        <input id="width-input" type="number" min="110" max="180" step="1" value="135" />
      </section>

      <section class="setting-card info-card">
        <p id="mode-copy" class="info-copy">
          Auto mode expands supported videos automatically.
        </p>
      </section>

      <footer class="popup-footer">
        <button id="open-options" class="secondary-button" type="button">Open Options</button>
        <p id="status-text" class="status-text" role="status">Ready</p>
      </footer>
    </main>

    <script type="module" src="./popup/main.ts"></script>
  </body>
</html>
